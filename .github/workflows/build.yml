name: "build-sign"
on:
  workflow_dispatch:
  push:
    branches:
      - release
jobs:
  build-tauri:
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: "--bundles deb,appimage,rpm"
          - platform: "windows-latest"
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Linux system dependencies for Tauri bundles
      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config

          # quick sanity checks (optional)
          pkg-config --modversion gtk+-3.0 || true
          pkg-config --modversion libsoup-3.0 || true
          pkg-config --modversion webkit2gtk-4.1 || true
      # macOS bundles are ad-hoc signed (signingIdentity "-" in tauri.conf.json).
      # No Apple Developer ID is required; users bypass Gatekeeper on first launch.
      # See README "Installing on macOS" for the end-user instructions.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: install frontend dependencies
        run: bun install
      - name: Extract app version on Unix systems
        if: matrix.platform == 'macos-latest' || matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          APP_VERSION=$(grep -m1 'version =' src-tauri/Cargo.toml | cut -d '"' -f2)
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
      - name: Extract app version on Windows
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $APP_VERSION = Select-String -Path src-tauri/Cargo.toml -Pattern 'version = "([^"]*)"' | ForEach-Object { $_.Matches.Groups[1].Value }
          echo "APP_VERSION=$APP_VERSION" >> $env:GITHUB_ENV
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOSX_DEPLOYMENT_TARGET: 11.0
          CARGO_BUILD_JOBS: 4
          CARGO_INCREMENTAL: true
          MACOS_TARGETS_OPTIMIZED: true
        with:
          args: ${{ matrix.args }}
      # Upload artifacts by platform
      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: |
            target/universal-apple-darwin/release/bundle/macos/Balatro Mod Manager.app/**
            target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/Balatro Mod Manager.app/**
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 1
      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 1
      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-app
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm
          retention-days: 1
  build-flatpak:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder appstream appstream-util
      - name: Verify AppStream tooling
        run: |
          command -v appstream-compose
      - name: Add Flathub remote
        run: |
          flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
      - name: Install Flatpak runtimes
        run: |
          flatpak install -y --user flathub \
            org.gnome.Platform//47 \
            org.gnome.Sdk//47 \
            org.freedesktop.Sdk.Extension.node20//24.08 \
            org.freedesktop.Sdk.Extension.rust-stable//24.08
      - name: Build Flatpak bundle
        run: |
          flatpak-builder --force-clean build-dir packaging/flatpak/io.balatro.ModManager.json
          flatpak build-export --no-update-summary repo build-dir
          flatpak build-bundle repo balatro-mod-manager.flatpak io.balatro.ModManager master
      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: balatro-mod-manager.flatpak
          retention-days: 1
